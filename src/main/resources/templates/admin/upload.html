<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파일 업로드 - 관리자 페이지</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            color: #333;
            font-size: 24px;
        }
        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .nav-links a,
        .nav-links button {
            background: none;
            border: 0;
            padding: 0;
            color: #667eea;
            cursor: pointer;
            font: inherit;
            text-decoration: none;
            font-weight: 600;
        }
        .nav-links a:hover,
        .nav-links button:hover {
            text-decoration: underline;
            transform: none;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .file-input-wrapper {
            margin-bottom: 15px;
        }
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            cursor: pointer;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }
        .description {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📤 파일 업로드</h1>
            <div class="nav-links">
                <a href="/admin/validate">검증 페이지</a>
                <form th:action="@{/admin/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">로그아웃</button>
                </form>
            </div>
        </div>

        <div th:if="${success}" class="success" th:text="${success}"></div>
        <div th:if="${error}" class="error" th:text="${error}"></div>

        <div class="card">
            <h2>📄 PDF 업로드 (수강편람)</h2>
            <p class="description">수강편람 PDF 파일을 업로드하면 Gemini AI로 파싱하여 DB에 저장합니다.</p>
            <form th:action="@{/admin/upload/pdf}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="file-input-wrapper">
                    <input type="file" name="file" accept=".pdf" required>
                </div>
                <button type="submit">PDF 파싱 & 저장</button>
            </form>
        </div>

        <div class="card">
            <h2>📊 Excel 업로드 (종합강의시간표)</h2>
            <p class="description">종합강의시간표 Excel 파일(.xlsx)을 학수번호 기준으로 비교하여 DB에 반영합니다. 삭제 대상은 물리 삭제하지 않고 비활성화합니다.</p>
            <form th:action="@{/admin/upload/excel}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div style="margin-bottom: 15px;">
                    <label for="semester" style="display:block; margin-bottom:8px; font-weight:600;">학기</label>
                    <input id="semester" type="text" name="semester" placeholder="예: 2026-2" required
                           style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display:flex; align-items:center; gap:8px; font-weight:600;">
                        <input id="deactivateMissing" type="checkbox" name="deactivateMissing" value="true" checked>
                        업로드에 없는 기존 과목과 기존 AI/수동 과목을 비활성화 (active=false)
                    </label>
                    <p style="margin:6px 0 0; color:#666; font-size:0.85em;">
                        체크 해제 시 신규/변경분만 반영하고 기존 과목은 유지합니다.
                    </p>
                </div>
                <div class="file-input-wrapper">
                    <input type="file" name="file" accept=".xlsx" required>
                </div>
                <button type="submit">Excel 파싱 & 저장</button>
            </form>
        </div>
    </div>
</body>
</html>
