<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파싱 검증 - 관리자 페이지</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            color: #333;
            font-size: 24px;
        }
        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .nav-links a,
        .nav-links button {
            background: none;
            border: 0;
            padding: 0;
            color: #667eea;
            cursor: pointer;
            font: inherit;
            text-decoration: none;
            font-weight: 600;
        }
        .nav-links a:hover,
        .nav-links button:hover {
            text-decoration: underline;
            transform: none;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        input[type="file"] {
            border-style: dashed;
            cursor: pointer;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }
        .description {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 파싱 검증</h1>
            <div class="nav-links">
                <a href="/admin/upload">업로드 페이지</a>
                <form th:action="@{/admin/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">로그아웃</button>
                </form>
            </div>
        </div>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <div class="card">
            <h2>📄 PDF 파싱 검증</h2>
            <p class="description">PDF를 파싱하여 DB 데이터와 비교합니다. (DB에 저장하지 않음)</p>
            <form th:action="@{/admin/validate/pdf}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="pdf-file">PDF 파일</label>
                    <input type="file" id="pdf-file" name="file" accept=".pdf" required>
                </div>
                <div class="form-group">
                    <label for="pdf-semester">학기 (선택)</label>
                    <input type="text" id="pdf-semester" name="semester" placeholder="예: 2025-1">
                </div>
                <button type="submit">PDF 검증 시작</button>
            </form>
        </div>

        <div class="card">
            <h2>📊 Excel 파싱 검증</h2>
            <p class="description">Excel을 파싱하여 DB 데이터와 비교합니다. (DB에 저장하지 않음)</p>
            <form th:action="@{/admin/validate/excel}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="excel-file">Excel 파일</label>
                    <input type="file" id="excel-file" name="file" accept=".xlsx" required>
                </div>
                <div class="form-group">
                    <label for="excel-semester">학기 (선택)</label>
                    <input type="text" id="excel-semester" name="semester" placeholder="예: 2025-1">
                </div>
                <button type="submit">Excel 검증 시작</button>
            </form>
        </div>
    </div>
</body>
</html>
