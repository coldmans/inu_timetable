spring:
  application:
    name: timeTable
  profiles:
    active: ${SPRING_PROFILE:dev}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  servlet:
    session:
      timeout: ${ADMIN_SESSION_TIMEOUT:30m}
      cookie:
        path: /admin
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}

gemini:
  api:
    key: ${GEMINI_API_KEY}

admin:
  username: ${ADMIN_USERNAME:admin}
  password-hash: ${ADMIN_PASSWORD_HASH:}
  password: ${ADMIN_PASSWORD:}
  bcrypt-strength: ${ADMIN_BCRYPT_STRENGTH:12}
  login:
    max-failures: ${ADMIN_LOGIN_MAX_FAILURES:5}
    lock-minutes: ${ADMIN_LOGIN_LOCK_MINUTES:10}

subject:
  cache:
    maximum-size: ${SUBJECT_CACHE_MAXIMUM_SIZE:1000}
    expire-after-write: ${SUBJECT_CACHE_EXPIRE_AFTER_WRITE:10m}
    warm-up:
      enabled: ${SUBJECT_CACHE_WARM_UP_ENABLED:true}
      concurrency: ${SUBJECT_CACHE_WARM_UP_CONCURRENCY:4}
      page-size: ${SUBJECT_CACHE_WARM_UP_PAGE_SIZE:20}

# Actuator 모니터링 설정
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
  info:
    env:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 0.0.1-SNAPSHOT
    description: 인천대학교 시간표 관리 시스템
