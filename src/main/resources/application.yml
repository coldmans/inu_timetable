spring:
  application:
    name: timeTable
  profiles:
    # 배포 스크립트(deploy-blue-green.sh)와 동일한 표준 변수명으로 통일.
    # 운영 배포 시 SPRING_PROFILES_ACTIVE=prod 가 주입되며, 미설정 시 로컬 개발용 dev 로 동작한다.
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      # 업로드 크기 상한 (수강편람 PDF/Excel). 미설정 시 메모리 고갈 위험이 있어 명시.
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:20MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:22MB}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  servlet:
    session:
      timeout: ${ADMIN_SESSION_TIMEOUT:30m}
      cookie:
        path: ${SESSION_COOKIE_PATH:/}
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}

gemini:
  api:
    key: ${GEMINI_API_KEY}

admin:
  username: ${ADMIN_USERNAME:admin}
  password-hash: ${ADMIN_PASSWORD_HASH:}
  password: ${ADMIN_PASSWORD:}
  bcrypt-strength: ${ADMIN_BCRYPT_STRENGTH:12}
  login:
    max-failures: ${ADMIN_LOGIN_MAX_FAILURES:5}
    lock-minutes: ${ADMIN_LOGIN_LOCK_MINUTES:10}

user:
  bcrypt-strength: ${USER_BCRYPT_STRENGTH:12}
  login:
    max-failures: ${USER_LOGIN_MAX_FAILURES:5}
    lock-minutes: ${USER_LOGIN_LOCK_MINUTES:10}

# Actuator 모니터링 설정
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
  info:
    env:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s

info:
  app:
    name: ${spring.application.name}
    version: 0.0.1-SNAPSHOT
    description: 인천대학교 시간표 관리 시스템

# CORS 허용 오리진 (기본값에는 로컬 개발용 origin 포함).
# 운영에서는 application-prod.yml 또는 CORS_ALLOWED_ORIGINS 환경변수로 override 하여 localhost 를 제거한다.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://inu-timetable-front-git-main-jjhs-projects-4d22a2fd.vercel.app,https://inuu-timetable.vercel.app,http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175}
