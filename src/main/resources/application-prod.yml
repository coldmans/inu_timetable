spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

# 운영환경 Actuator 설정 (제한적 노출)
management:
  endpoints:
    web:
      exposure:
        # metrics 개별 엔드포인트는 제거하고 Prometheus scrape 용 prometheus 만 노출.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      show-components: never
  # /actuator/info 가 환경변수/프로퍼티를 노출하지 않도록 비활성화.
  info:
    env:
      enabled: false

logging:
  level:
    root: WARN
    inu.timetable: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

# 운영 세션 쿠키 보안: HTTPS 전용(Secure) + 크로스사이트(SPA 별도 오리진) 허용.
# nginx 가 HTTPS 종단이므로 X-Forwarded-Proto 를 신뢰해 Secure 쿠키가 정상 발급되게 한다.
server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true
        same-site: none

# 운영에서 API 문서(Swagger UI / OpenAPI) 비공개. 전체 API 명세 노출 차단.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 운영 CORS 허용 오리진 (로컬 개발 origin 제거). 필요 시 CORS_ALLOWED_ORIGINS 로 주입.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://inu-timetable-front-git-main-jjhs-projects-4d22a2fd.vercel.app,https://inuu-timetable.vercel.app}
