name: Deploy to GCP (via Docker Hub)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/inutable:latest

      - name: Deploy to GCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # 1. Docker Hub에서 최신 이미지 가져오기
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/inutable:latest
            
            # 2. 기존 컨테이너 중지 및 삭제 (청소)
            sudo docker rm -f inu-backend || true
            
            # 3. 안 쓰는 찌꺼기 이미지 정리 (용량 확보)
            sudo docker image prune -f

            # 4. 새 이미지로 실행 (완전체 명령어)
            sudo docker run -d -p 8080:8080 \
              --name inu-backend \
              -e SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              -e SPRING_FLYWAY_ENABLED=false \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_KEY }}" \
              -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME || 'admin' }}" \
              -e ADMIN_PASSWORD_HASH='${{ secrets.ADMIN_PASSWORD_HASH }}' \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              -e SPRING_PROFILES_ACTIVE=prod \
              ${{ secrets.DOCKERHUB_USERNAME }}/inutable:latest

            # 5. 컨테이너가 실제로 정상 부팅했는지 확인
            i=1
            while [ "$i" -le 30 ]; do
              if curl -fsS http://localhost:8080/actuator/health; then
                echo "Backend health check passed."
                exit 0
              fi

              if ! sudo docker ps --filter "name=inu-backend" --filter "status=running" --format "{{.Names}}" | grep -q "^inu-backend$"; then
                echo "Backend container stopped during startup."
                sudo docker logs --tail=200 inu-backend
                exit 1
              fi

              sleep 2
              i=$((i + 1))
            done

            echo "Backend health check timed out."
            sudo docker logs --tail=200 inu-backend
            exit 1
